name: kugla
description: A GeoGuessr-style MVP in Flutter.
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_google_street_view:
    path: third_party/packages/flutter_google_street_view
  google_maps_flutter: ^2.5.3
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.5.3
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  image_picker: ^1.0.7
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  street_view_platform_interface:
    path: third_party/packages/street_view_platform_interface

flutter:
  uses-material-design: true
  assets:
    - assets/bg/map_parchment.png

# Icons: run `python3 tools/generate_app_icons.py` then `dart run flutter_launcher_icons`.
# Master logo: uploads/kuglafixed.jpg (falls back to assets/icon/kugla_app_icon.png).
# Android adaptive: transparent RGBA foreground + solid background (#0B0D12).
# iOS / legacy Android mipmaps: kugla_app_icon_ios.png (mark scaled on deepSpace).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/kugla_app_icon_ios.png
  image_path_android: assets/icon/kugla_app_icon_ios.png
  image_path_ios: assets/icon/kugla_app_icon_ios.png
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0B0D12"
  adaptive_icon_foreground: assets/icon/kugla_app_icon_foreground.png
  adaptive_icon_foreground_inset: 6
