workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Tres App Store Connect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kugla.app
      groups:
        - kugla_secrets
      vars:
        APP_ID: 6761148502
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Disable Swift Package Manager
        script: flutter config --no-enable-swift-package-manager

      - name: Write API key to xcconfig
        script: echo "GMS_API_KEY=$GMS_API_KEY" > ios/Flutter/Secrets.xcconfig

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build IPA
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number --platform=IOS "$APP_ID" 2>/dev/null || true)
          if ! [[ "$LATEST_BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            LATEST_BUILD_NUMBER=0
          fi

          flutter build ipa \
            --release \
            --build-number=$((LATEST_BUILD_NUMBER + 1)) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
