format_version: 11
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: flutter
title: Kugla

app:
  envs:
  - PROJECT_LOCATION: .
  - APK_PATH: "$BITRISE_SOURCE_DIR/build/app/outputs/flutter-apk/app-release.apk"

workflows:
  primary:
    description: Build the Android release APK for pushes to master.
    triggers:
      push:
      - branch: master
      pull_request:
      - target_branch: master
        draft_enabled: false
    steps:
    - activate-ssh-key:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone: {}
    - cache-pull: {}
    - flutter-installer: {}
    - script:
        title: Refresh cached JUnit helper
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -euo pipefail

            PUB_CACHE_DIR="${HOME}/.pub-cache"

            rm -f "${PUB_CACHE_DIR}/bin/tojunit"
            rm -f "${PUB_CACHE_DIR}"/global_packages/junitreport/bin/*.snapshot

            dart pub global activate junitreport
    - script:
        title: Validate Bitrise secrets
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -euo pipefail

            if [ -z "${GOOGLE_MAPS_API_KEY:-}" ]; then
              echo "Missing required Bitrise Secret: GOOGLE_MAPS_API_KEY"
              exit 1
            fi
    - script:
        title: Flutter pub get
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -euo pipefail
            flutter pub get
    - script:
        title: Build Android release APK
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -euo pipefail
            flutter build apk --release
    - deploy-to-bitrise-io:
        inputs:
        - deploy_path: "$APK_PATH"
    - cache-push: {}
